<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ūü¶ä Stocks</title>
  <link rel="stylesheet" href="/tokens.css" />
  <style>
    body { background: var(--c-bg); color: var(--c-text); font-family: var(--font-sans); margin: 0; padding: var(--space-4); padding-top: calc(var(--space-4) + var(--safe-t)); -webkit-font-smoothing: antialiased; }
    .header { display:flex; align-items:center; justify-content:space-between; gap: 10px; margin-bottom: var(--space-4); }
    .h-left { display:flex; flex-direction:column; gap: 2px; }
    .title { font-size: 18px; font-weight: 900; color: var(--c-accent); margin: 0; }
    .sub { font-family: var(--font-mono); font-size: 11px; font-weight: 800; color: var(--c-muted); line-height: 1.15; white-space: pre-line; }
    .h-right { display:flex; gap: 8px; align-items:center; }
    .badge { background: rgba(84,214,44,0.12); color: var(--c-success); border: 1px solid rgba(84,214,44,0.22); padding: 6px 10px; border-radius: 999px; font-size: 11px; font-weight: 800; }
    .btn { border: var(--bd-1); background: rgba(255,255,255,0.06); color: var(--c-text); padding: 8px 12px; border-radius: 999px; font-size: 13px; font-weight: 800; cursor: pointer; }
    .btn:active { transform: scale(0.99); }

    .tabs { display:flex; gap: 8px; margin-bottom: var(--space-4); }
    .tab { flex: 1; text-align:center; padding: 10px 10px; border-radius: 12px; border: var(--bd-1); background: rgba(255,255,255,0.03); font-weight: 900; font-size: 13px; cursor: pointer; }
    .tab.active { border-color: rgba(88,166,255,0.55); background: rgba(88,166,255,0.10); }

    .section { background: var(--c-surface); border: var(--bd-1); border-radius: var(--r-lg); padding: 14px; margin-bottom: var(--space-3); }
    .section h2 { margin: 0 0 10px 0; font-size: 12px; letter-spacing: 0.12em; color: var(--c-muted); text-transform: uppercase; }

    .table { width: 100%; border-collapse: collapse; }
    .tr { border-bottom: 1px solid rgba(255,255,255,0.06); }
    .tr:last-child { border-bottom: none; }
    .td { padding: 10px 6px; vertical-align: middle; font-size: 14px; }
    .sym { font-weight: 900; font-size: 15px; }
    .name { font-size: 11px; color: var(--c-muted); margin-top: 2px; line-height: 1.15; }

    .price { font-family: var(--font-mono); font-weight: 900; font-size: 14px; text-align: right; white-space: nowrap; }
    .chg { font-family: var(--font-mono); font-size: 11px; text-align: right; opacity: 0.95; white-space: nowrap; }
    .up { color: var(--c-success); }
    .down { color: var(--c-danger); }
    .flat { color: var(--c-muted); }

    .spark { width: 64px; height: 22px; }
    .spark polyline { fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }

    .pill { display:inline-flex; align-items:center; justify-content:center; padding: 4px 8px; border-radius: 999px; font-size: 11px; font-weight: 900; border: 1px solid rgba(255,255,255,0.14); white-space: nowrap; }
    .pill.buy { background: rgba(84,214,44,0.16); border-color: rgba(84,214,44,0.30); color: var(--c-success); }
    .pill.sell { background: rgba(248,81,73,0.14); border-color: rgba(248,81,73,0.28); color: var(--c-danger); }
    .pill.wait { background: rgba(145,158,171,0.16); border-color: rgba(145,158,171,0.22); color: var(--c-muted); }

    .loading { opacity: 0.65; font-style: italic; color: var(--c-muted); font-size: 13px; padding: 6px 2px; }
    .footer { text-align:center; color: var(--c-muted); font-size: 11px; margin-top: var(--space-5); padding-bottom: calc(var(--space-4) + var(--safe-b)); line-height: 1.5; }

    /* Make tables usable on narrow screens */
    .scroll-x { overflow-x: auto; }
  </style>

  <!-- React (no build) via ESM CDN + htm (JSX-less) -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "htm": "https://esm.sh/htm@3.1.1"
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import React, { useEffect, useMemo, useRef, useState } from 'react';
    import { createRoot } from 'react-dom/client';
    import htm from 'htm';

    const html = htm.bind(React.createElement);

    const TG = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
    const TG_INITDATA = TG ? TG.initData : '';

    const token = () => {
      const p = new URLSearchParams(location.search);
      return p.get('token') || '';
    };

    function apiFetch(url, opts={}) {
      const sep = url.includes('?') ? '&' : '?';
      const u = `${url}${sep}_t=${Date.now()}`;
      const headers = { ...(opts.headers||{}), ...(TG_INITDATA ? {'X-TG-INITDATA': TG_INITDATA} : {}) };
      return fetch(u, { ...opts, headers });
    }

    function fmtChg(s) {
      let t = (s || '').trim();
      if (!t) return { text: '0%', cls: 'flat' };
      if (t === 'N/A') return { text: 'N/A', cls: 'flat' };
      if (t === '0%') return { text: '0%', cls: 'flat' };
      if (t.includes('-')) return { text: t, cls: 'down' };
      if (!t.startsWith('+')) t = '+' + t;
      return { text: t, cls: 'up' };
    }

    function Sparkline({ points, cls }) {
      if (!points || points.length < 2) return html`<span style=${{opacity:0.4, fontSize:'11px'}}>‚ÄĒ</span>`;
      const w=64, h=22;
      const min=Math.min(...points), max=Math.max(...points);
      const r=(max-min)||1;
      const coords = points.map((p,i)=>`${(i/(points.length-1))*w},${h-((p-min)/r)*h}`).join(' ');
      const stroke = (cls==='up') ? 'var(--c-success)' : (cls==='down' ? 'var(--c-danger)' : 'var(--c-muted)');
      return html`<svg class="spark" viewBox=${`0 0 ${w} ${h}`}>
        <polyline points=${coords} style=${{stroke}} />
      </svg>`;
    }

    function Row({ s }) {
      const chg = fmtChg(s.change);
      const pillType = (s.type || 'wait');
      return html`
        <tr class="tr">
          <td class="td" style=${{width:'46%'}}>
            <div class="sym">${s.symbol || ''}</div>
            ${s.name ? html`<div class="name">${s.name}</div>` : null}
          </td>
          <td class="td" style=${{width:'18%'}}>
            <div class=${`price ${chg.cls}`}>${s.price ?? '-'}</div>
            <div class=${`chg ${chg.cls}`}>${chg.text}</div>
          </td>
          <td class="td" style=${{width:'18%'}}>
            <${Sparkline} points=${s.sparkline || []} cls=${chg.cls} />
          </td>
          <td class="td" style=${{width:'18%', textAlign:'right'}}>
            <span class=${`pill ${pillType}`}>${s.action || '‚ÄĒ'}</span>
          </td>
        </tr>
      `;
    }

    function ClockLine() {
      const [tick, setTick] = useState(0);
      useEffect(() => {
        const t = setInterval(()=>setTick(x=>x+1), 500);
        return () => clearInterval(t);
      }, []);
      const now = new Date();
      const ny = now.toLocaleString('en-US', { timeZone: 'America/New_York', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
      const utc = now.toLocaleString('en-US', { timeZone: 'UTC', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
      return html`<div class="sub">ET: ${ny}\nUTC: ${utc}</div>`;
    }

    function App() {
      const [tab, setTab] = useState('watchlist'); // watchlist | holdings
      const [quotes, setQuotes] = useState(null);
      const [signals, setSignals] = useState(null);
      const [lastUpdate, setLastUpdate] = useState(null);

      async function loadQuotes() {
        try {
          const res = await apiFetch('/api/market-quotes');
          const data = await res.json();
          setQuotes(data.quotes || []);
          setLastUpdate(Date.now());
        } catch {}
      }

      async function loadSignals() {
        try {
          const res = await apiFetch('/api/signals');
          const data = await res.json();
          setSignals({
            watchlist: data.competition || [],
            holdings: data.longterm || []
          });
        } catch {}
      }

      useEffect(() => {
        loadQuotes();
        loadSignals();
        const q = setInterval(loadQuotes, 15000);
        const s = setInterval(loadSignals, 5000);
        return () => { clearInterval(q); clearInterval(s); };
      }, []);

      function close() {
        const t = token();
        location.href = t ? `/?token=${t}` : '/';
      }

      const active = (tab === 'watchlist') ? (signals?.watchlist) : (signals?.holdings);

      return html`
        <div>
          <div class="header">
            <div class="h-left">
              <div class="title">ūü¶ä Ťā°Á•®Ść≥śôā</div>
              <${ClockLine} />
            </div>
            <div class="h-right">
              <span class="badge">LIVE</span>
              <button class="btn" onClick=${close} title="ťóúťĖČ">‚úē</button>
            </div>
          </div>

          <div class="tabs">
            <div class=${`tab ${tab==='watchlist'?'active':''}`} onClick=${()=>setTab('watchlist')}>WatchlistÔľąŤŅÖÁčźÔľČ</div>
            <div class=${`tab ${tab==='holdings'?'active':''}`} onClick=${()=>setTab('holdings')}>HoldingsÔľąťĚąÁčźÔľČ</div>
          </div>

          <div class="section">
            <h2>ŚłāŚ†īŤ°ĆśÉÖ</h2>
            <div class="scroll-x">
              <table class="table">
                <tbody>
                  ${quotes ? (quotes.length ? quotes.map(q => html`<${Row} s=${{...q, action: q.note || '‚ÄĒ', type: 'wait'}} />`) : html`<div class="loading">ÔľąÁĄ°Ť≥áśĖôÔľČ</div>`) : html`<div class="loading">ŤľČŚÖ•šł≠‚Ä¶</div>`}
                </tbody>
              </table>
            </div>
          </div>

          <div class="section">
            <h2>${tab === 'watchlist' ? 'ŤŅÖÁčźśąįŤ°ď (Competition)' : 'ťĚąÁčź V5 śĆĀŚÄČ'}</h2>
            <div class="scroll-x">
              <table class="table">
                <tbody>
                  ${active ? (active.length ? active.map(s => html`<${Row} s=${s} />`) : html`<div class="loading">ÔľąÁ©ļÔľČ</div>`) : html`<div class="loading">ŤľČŚÖ•šł≠‚Ä¶</div>`}
                </tbody>
              </table>
            </div>
          </div>

          <div class="footer">
            vReact-B (no-build) ¬∑ śõīśĖįÔľö${lastUpdate ? new Date(lastUpdate).toLocaleString('zh-TW', { timeZone: 'Asia/Taipei', hour12:false }) : '‚ÄĒ'}
          </div>
        </div>
      `;
    }

    createRoot(document.getElementById('root')).render(html`<${App} />`);
  </script>
</body>
</html>
