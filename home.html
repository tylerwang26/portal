<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🦊 靈狐 Portal</title>
    <link rel="stylesheet" href="/tokens.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--c-bg, #0d1117); color: var(--c-text, #e6edf3); font-family: var(--font-sans, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif); padding: 16px; padding-top: calc(16px + env(safe-area-inset-top, 0px)); min-height: 100vh; }

        .hero { text-align: center; padding: 24px 0 16px; }
        .hero h1 { font-size: 22px; font-weight: 700; }
        .hero h1 span { font-size: 28px; }
        .hero p { font-size: 13px; color: #8b949e; margin-top: 4px; }

        .icon-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px 12px;
            margin: 8px auto 18px;
            max-width: 820px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border: 1px solid #21262d;
            background: rgba(22,27,34,0.55);
            border-radius: 999px;
        }
        .icon-btn {
            width: 30px;
            height: 30px;
            min-width: 30px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: inherit;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.10);
            background: rgba(255,255,255,0.03);
            cursor: pointer;
            appearance: none;
        }
        .icon-btn:active { background: rgba(255,255,255,0.10); border-color: rgba(88,166,255,0.55); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 16px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: border-color 0.2s;
        }
        .card:active { border-color: #58a6ff; }
        .card .emoji { font-size: 20px; }
        .card .title { font-size: 14px; font-weight: 600; color: #e6edf3; }
        .card .card-header { display: flex; align-items: center; gap: 6px; }
        .card .desc { font-size: 11px; color: #8b949e; line-height: 1.4; }

        .card.featured {
            background: linear-gradient(135deg, #161b22 0%, #1a2332 100%);
            border-color: #1f6feb;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 20px 0 10px;
            padding-left: 4px;
        }

        .list {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            overflow: hidden;
        }
        .list.scroll5 {
            max-height: 280px; /* ~5 items */
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .list a {
            display: flex;
            align-items: center;
            padding: 13px 16px;
            text-decoration: none;
            color: inherit;
            border-bottom: 1px solid #21262d;
            gap: 12px;
        }
        .list a:last-child { border-bottom: none; }
        .list a:active { background: rgba(255,255,255,0.04); }
        .list .le { font-size: 18px; width: 24px; text-align: center; }
        .list .lt { font-size: 14px; flex: 1; }
        .list .la { font-size: 12px; color: #8b949e; }

        .footer { text-align: center; padding: 24px 0; font-size: 11px; color: #484f58; }
        
        .top-actions {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }
        .top-actions .voice-btn,
        .top-actions .upload-btn,
        .top-actions .play-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: none;           /* Tyler: transparent, no filled background */
            background: transparent;
            backdrop-filter: none;
        }

        .top-actions .play-btn {
            border: 2px solid rgba(255,255,255,0.55);
            color: rgba(255,255,255,0.9);
        }
        .top-actions .play-btn:active,
        .top-actions .play-btn:hover { background: rgba(255,255,255,0.08); }
            position: fixed;
            top: 16px;
            right: 16px;
            display: flex;
            gap: 12px;
            z-index: 1000;
        }
        .upload-btn, .voice-btn {
            width: 36px;
            height: 36px;
            border: 2px solid #388bfd;
            border-radius: 50%;
            color: #388bfd;
            font-size: 16px;
            cursor: pointer;
            box-shadow: none;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .upload-btn {
            border-color: #238636;
            color: #238636;
        }
        .upload-btn:active, .upload-btn:hover { background: rgba(35, 134, 54, 0.1); }
        .voice-btn {
            border-color: #388bfd;
            color: #388bfd;
            margin-right: 8px;
        }
        .voice-btn:active, .voice-btn:hover { background: rgba(56, 139, 253, 0.1); }
        .voice-btn.recording {
            background: #ff4477;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .logout-btn {
            width: 100%;
            max-width: 400px;
            margin: 20px auto;
            padding: 12px;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #f85149;
            font-size: 14px;
            cursor: pointer;
            display: block;
        }
        .logout-btn:active { background: #161b22; }
        
        .upload-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .upload-modal.active { display: flex; }
        .upload-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .upload-header { display:flex; align-items:center; justify-content:space-between; gap: 10px; margin-bottom: 16px; }
        .upload-box h2 { font-size: 18px; margin: 0; }
        .upload-close {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(255,255,255,0.06);
            color: var(--c-text, #e6edf3);
            font-size: 18px;
            cursor: pointer;
        }
        .upload-close:active { background: rgba(255,255,255,0.10); }
        .upload-area {
            border: 2px dashed #30363d;
            border-radius: 8px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 16px;
        }
        .upload-area:hover { border-color: #58a6ff; background: rgba(88,166,255,0.05); }
        .upload-area.dragover { border-color: #58a6ff; background: rgba(88,166,255,0.1); }
        .file-list { margin-top: 16px; }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: #0d1117;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .file-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-item .size { color: #8b949e; margin: 0 8px; }
        .file-item button { background: none; border: none; color: #f85149; cursor: pointer; font-size: 18px; padding: 0 4px; }
        .upload-actions { display: flex; gap: 8px; margin-top: 16px; }
        .upload-actions button { flex: 1; padding: 10px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: 600; }
        .btn-upload { background: #238636; color: #fff; }
        .btn-upload:active { background: #2ea043; }
        .btn-confirm { background: #238636; color: #fff; padding: 12px 18px; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; }
        .btn-confirm:active { background: #2ea043; }
        .btn-cancel { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }
        .btn-cancel:active { background: #161b22; }
        .upload-result { margin-top: 16px; padding: 12px; background: #0d1117; border-radius: 6px; font-size: 13px; line-height: 1.6; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="hero" style="display:flex; justify-content:space-between; align-items:center;">
        <div style="flex:1;">
            <h1 onclick="window.location.reload()" style="cursor:pointer;"><span>🦊</span> 靈狐 Portal</h1>
            <p>Tyler's AI Command Center</p>
        </div>
    </div>

    <!-- One-line icon bar -->
    <div class="icon-bar" aria-label="Quick links">
        <a class="icon-btn" href="/stocks" title="即時股票" aria-label="即時股票" target="_blank" rel="noopener">📈</a>
        <a class="icon-btn" href="/skills.html" title="Skills" target="_blank" rel="noopener">🧠</a>
        <a class="icon-btn" id="explorer-link" href="/explorer?path=obsidian_vault" title="檔案總管" target="_blank" rel="noopener">📂</a>
        <button class="icon-btn" onclick="openUploadModal()" title="上傳檔案" aria-label="上傳檔案">📤</button>
        <button class="icon-btn" onclick="clipLink()" title="收藏連結" aria-label="收藏連結">🔗</button>
    </div>

    <!-- Clip Link Modal -->
    <div id="clipModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:2000; padding:18px;">
        <div style="max-width:720px; margin: 60px auto 0; background:#0f141b; border:1px solid #30363d; border-radius:14px; overflow:hidden;">
            <div style="padding:14px 14px; border-bottom:1px solid #21262d; display:flex; align-items:center; justify-content:space-between; gap:10px;">
                <div style="font-weight:800; font-size:14px;">🔗 收藏連結</div>
                <button class="icon-btn" style="width:30px;height:30px;min-width:30px;font-size:16px;" onclick="closeClipModal()" title="關閉">✕</button>
            </div>
            <div style="padding:14px; display:flex; flex-direction:column; gap:10px;">
                <div style="display:flex; flex-direction:column; gap:6px;">
                    <div style="font-size:12px; color:#8b949e;">URL</div>
                    <input id="clipUrl" placeholder="貼上連結…" style="width:100%; padding:10px 12px; border-radius:10px; border:1px solid #30363d; background:#0b0f14; color:#e6edf3;" />
                </div>
                <div style="display:flex; flex-direction:column; gap:6px;">
                    <div style="font-size:12px; color:#8b949e;">標題（貼上 URL 後會自動抓取，可手改）</div>
                    <input id="clipTitle" placeholder="自動生成中…" style="width:100%; padding:10px 12px; border-radius:10px; border:1px solid #30363d; background:#0b0f14; color:#e6edf3;" />
                </div>
                <div style="display:flex; flex-direction:column; gap:6px;">
                    <div style="font-size:12px; color:#8b949e;">標籤（逗號分隔，可留空；會插在摘要後）</div>
                    <input id="clipTags" placeholder="youtube, trading…" style="width:100%; padding:10px 12px; border-radius:10px; border:1px solid #30363d; background:#0b0f14; color:#e6edf3;" />
                </div>
                <div id="clipStatus" style="font-size:12px; color:#8b949e;"></div>
                <div style="display:flex; gap:14px; justify-content:center; padding-top:10px; flex-wrap:wrap;">
                    <button class="icon-btn" style="width:auto; min-width:110px; height:40px; border-radius:12px; font-size:14px; padding:0 14px;" onclick="captureClipLink()">截取</button>
                    <button class="icon-btn" style="width:auto; min-width:110px; height:40px; border-radius:12px; font-size:14px; padding:0 14px;" onclick="closeClipModal()">取消</button>
                    <button class="icon-btn" style="width:auto; min-width:110px; height:40px; border-radius:12px; font-size:14px; padding:0 14px; background: rgba(63,185,80,0.18); border: 1px solid rgba(63,185,80,0.45);" onclick="saveClipLink()">儲存</button>
                </div>
            </div>
        </div>
    </div>


    <!-- ⭐️ 我的最愛 -->
    <div style="display:flex; align-items:center; justify-content:flex-start; gap:10px; margin: 20px 0 10px; padding-left: 4px; flex-wrap:wrap;">
        <a href="/favorites" class="icon-btn" style="width:auto; min-width:auto; padding: 0 12px; font-size: 13px; font-weight: 800;" title="查看全部最愛" target="_blank" rel="noopener">⭐️ 我的最愛</a>
    </div>
    <div class="list scroll5" id="favorites-section">
        <div style="padding:13px 16px; color:#8b949e; font-size:13px;">載入中...</div>
    </div>

    <!-- 🗓️ 近三日行程 -->
    <div class="section-title">🗓️ 近三日行程</div>
    <div class="list" id="agenda-section">
        <div style="padding:13px 16px; color:#8b949e; font-size:13px;">載入中...</div>
    </div>


    <div class="footer">🦊 Fox Fleet Portal · Powered by OpenClaw</div>

    <script src="/assets/tg_auth.js"></script>
    <script>
    // Voice command global variables (must be declared before functions)
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;
    let audioContext;

    // Last generated reply audio (for manual play button)
    let lastAudioUrl = '';

    // initData + apiFetch are centralized in /assets/tg_auth.js (window.portalAuth)
    const getInitData = () => (window.portalAuth ? window.portalAuth.getInitData() : '');

    function openClipModal() {
        document.getElementById('clipModal').style.display = 'block';
        document.getElementById('clipUrl').value = '';
        document.getElementById('clipTitle').value = '';
        document.getElementById('clipTags').value = '';
        document.getElementById('clipStatus').textContent = '';
        setTimeout(() => document.getElementById('clipUrl').focus(), 50);
    }

    function closeClipModal() {
        document.getElementById('clipModal').style.display = 'none';
    }

    // 의미 없는 title 判斷（可再擴充）
    function isBadTitle(t) {
        const s = (t || '').trim();
        if (!s) return true;
        const bad = ['home', '首頁', 'index', 'untitled', 'youtube'];
        if (bad.includes(s.toLowerCase())) return true;
        if (s.length < 3) return true;
        return false;
    }

    async function fetchClipSummary(url) {
        const initData = getInitData();
        const extraHeaders = initData ? { 'X-TG-INITDATA': initData } : {};
        const st = document.getElementById('clipStatus');
        st.textContent = '抓取標題/摘要中…';

        try {
            const sRes = await fetch('/api/link/summary', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json', ...extraHeaders },
                body: JSON.stringify({ url })
            });
            const s = await sRes.json().catch(() => ({}));
            if (!sRes.ok || !s.ok) throw new Error(s.error || `HTTP ${sRes.status}`);

            const titleEl = document.getElementById('clipTitle');
            if (isBadTitle(titleEl.value) && s.title) {
                titleEl.value = s.title;
            }
            st.textContent = '✅ 已抓取';
        } catch (e) {
            st.textContent = '⚠️ 抓取失敗（仍可手動填標題後儲存）';
        }
    }

    async function clipLink() {
        openClipModal();

        const urlEl = document.getElementById('clipUrl');
        urlEl.onchange = async () => {
            const u = (urlEl.value || '').trim();
            if (!u) return;
            await fetchClipSummary(u);
        };
        urlEl.onblur = async () => {
            const u = (urlEl.value || '').trim();
            if (!u) return;
            // When user pastes then taps away, auto fetch once
            if (!document.getElementById('clipTitle').value.trim()) {
                await fetchClipSummary(u);
            }
        };
    }

    async function captureClipLink() {
        const initData = getInitData();
        const extraHeaders = initData ? { 'X-TG-INITDATA': initData } : {};

        const url = (document.getElementById('clipUrl').value || '').trim();
        if (!url) { alert('請先填 URL'); return; }
        const title = (document.getElementById('clipTitle').value || '').trim();
        const status = document.getElementById('clipStatus');

        status.textContent = '📥 截取內容中…';
        try {
            const r = await fetch('/api/link/capture', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json', ...extraHeaders },
                body: JSON.stringify({ url, title })
            });
            const j = await r.json().catch(() => ({}));
            if (!r.ok || !j.ok) throw new Error(j.error || `HTTP ${r.status}`);

            const href = `/note?path=${encodeURIComponent(j.path)}`;
            status.innerHTML = `✅ 已截取 → <a href="${href}" style="color:#58a6ff; text-decoration:underline;">${j.path}</a>`;
        } catch (e) {
            status.textContent = `❌ 截取失敗：${e?.message || e}`;
        }
    }

    async function saveClipLink() {
        const initData = getInitData();
        const extraHeaders = initData ? { 'X-TG-INITDATA': initData } : {};

        const url = (document.getElementById('clipUrl').value || '').trim();
        if (!url) { alert('請先填 URL'); return; }
        let title = (document.getElementById('clipTitle').value || '').trim();
        const tags = (document.getElementById('clipTags').value || '').trim();
        const status = document.getElementById('clipStatus');

        // Fetch summary first; tags will be inserted after summary
        let description = '';
        try {
            const sRes = await fetch('/api/link/summary', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json', ...extraHeaders },
                body: JSON.stringify({ url })
            });
            const s = await sRes.json().catch(() => ({}));
            if (sRes.ok && s.ok) {
                if (isBadTitle(title) && s.title) title = s.title;
                if (s.description) description = s.description;
            }
        } catch {}

        const target = 'obsidian_vault/收藏/Inbox_Links.md';
        const now = new Date();
        const ts = now.toLocaleString('zh-TW', { timeZone: 'Asia/Taipei', hour12: false });

        // 按你的規格：Summary 完整後再插入 tags
        const entry = [
            `- ${ts}`,
            `  - Title: ${title || '(auto)'}`,
            `  - URL: ${url}`,
            description ? `  - Summary: ${String(description).trim().slice(0, 420)}` : null,
            tags ? `  - Tags: ${tags}` : null,
            `  - Source: home`,
            '',
        ].filter(Boolean).join('\n');

        try {
            status.textContent = '儲存中…';
            let existing = '';
            const viewRes = await fetch(`/api/workspace/view?path=${encodeURIComponent(target)}&_t=${Date.now()}`, { credentials: 'include', headers: { ...extraHeaders } });
            if (viewRes.ok) {
                const data = await viewRes.json().catch(() => ({}));
                existing = (data.content || '');
            } else {
                existing = '<!-- FontSize: 18px -->\n# Inbox Links\n\n';
            }

            const newContent = (existing.trimEnd() + '\n\n' + entry).replace(/\n{3,}/g, '\n\n');
            const saveRes = await fetch('/api/workspace/save', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json', ...extraHeaders },
                body: JSON.stringify({ path: target, content: newContent })
            });
            const out = await saveRes.json().catch(() => ({}));
            if (!saveRes.ok || !out.ok) throw new Error(out.error || `HTTP ${saveRes.status}`);

            status.textContent = '✅ 已收藏';
            closeClipModal();
        } catch (e) {
            alert('收藏失敗：' + (e?.message || String(e)));
            status.textContent = '';
        }
    }

    function playLastReply() {
        if (!lastAudioUrl) {
            alert('還沒有可播放的回覆音檔');
            return;
        }
        try {
            unlockAudio();
            persistentAudio.src = lastAudioUrl;
            persistentAudio.load();
            persistentAudio.play().catch(e => {
                console.error('Manual play failed:', e);
                alert('播放失敗：請確認 iPhone 沒有靜音、音量已開、且沒有連到藍牙耳機。');
            });
        } catch (e) {
            console.error('playLastReply error:', e);
        }
    }
    
    function esc(s) {
        return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    // Load favorites
    async function loadFavoritesHome() {
        try {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token') || '';
            const res = await fetch(`/api/favorites?token=${token}&_t=${Date.now()}`);
            const favs = await res.json();
            const el = document.getElementById('favorites-section');
            if (!favs.length) {
                el.innerHTML = '<div style="padding:13px 16px; color:#8b949e; font-size:13px;">尚無最愛，在 Explorer 檔案預覽時點 ⭐️ 加入</div>';
                return;
            }
            el.innerHTML = favs.map(f => {
                const name = (f.name || f.path).toLowerCase();
                const ext = name.split('.').pop();
                let icon = '📄';
                if (ext === 'md') icon = '📝';
                else if (ext === 'py') icon = '🐍';
                else if (ext === 'js' || ext === 'mjs') icon = '📜';
                else if (ext === 'json') icon = '📋';
                else if (ext === 'html') icon = '🌐';
                else if (ext === 'css') icon = '🎨';
                else if (ext === 'sh') icon = '⚙️';
                else if (ext === 'pdf') icon = '📕';
                else if (ext === 'csv' || ext === 'xlsx') icon = '📊';
                else if (['png','jpg','jpeg','gif','webp','svg'].includes(ext)) icon = '🖼️';
                else if (['mp3','wav','ogg'].includes(ext)) icon = '🎵';
                else if (['mp4','mov','avi'].includes(ext)) icon = '🎬';
                else if (ext === 'yaml' || ext === 'yml') icon = '🔧';
                else if (ext === 'ts' || ext === 'tsx') icon = '💎';
                // Name-based overrides
                if (name.includes('memory')) icon = '🧠';
                else if (name.includes('soul')) icon = '👻';
                else if (name.includes('agent')) icon = '🦊';

    // Load agenda (next 3 days)
    async function loadAgendaHome() {
        const el = document.getElementById('agenda-section');
        try {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token') || '';
            const res = await fetch(`/api/calendar/upcoming?days=3&token=${token}&_t=${Date.now()}`);
            const data = await res.json();
            if (!res.ok) throw new Error(data?.error || 'failed');

            const items = Array.isArray(data?.items) ? data.items : [];
            if (!items.length) {
                el.innerHTML = '<div style="padding:13px 16px; color:#8b949e; font-size:13px;">近三日沒有行程</div>';
                return;
            }

            el.innerHTML = items.map(ev => {
                const title = ev.summary || '(無標題)';
                const loc = ev.location ? ` · ${ev.location}` : '';

                // Prefer ISO fields if present; fall back to local strings
                const startIso = ev.start || ev.startLocal || '';
                const endIso = ev.end || ev.endLocal || '';

                // Helper to parse date-like strings into Date
                function toDate(x) {
                    if (!x) return null;
                    // If already looks like localized string (contains whitespace and non-T), keep as-is by returning null
                    // Prefer ISO parsing when possible
                    try { const d = new Date(x); if (!isNaN(d)) return d; } catch(e) {}
                    return null;
                }

                const sDate = toDate(startIso);
                const eDate = toDate(endIso);

                let timeRange = '';
                if (sDate) {
                    const dateOpts = { year:'numeric', month:'2-digit', day:'2-digit', weekday:'short', timeZone: 'Asia/Taipei' };
                    const timeOpts = { hour:'2-digit', minute:'2-digit', hour12:false, timeZone: 'Asia/Taipei' };
                    const datePart = sDate.toLocaleDateString('zh-TW', dateOpts).replace(/\//g,'/');
                    const startTime = sDate.toLocaleTimeString('zh-TW', timeOpts).replace(/\u2212/g,'-');
                    if (eDate) {
                        const endTime = eDate.toLocaleTimeString('zh-TW', timeOpts).replace(/\u2212/g,'-');
                        // If same calendar day, show start — end (times only on end)
                        if (sDate.toDateString() === eDate.toDateString()) {
                            timeRange = `${datePart} ${startTime} — ${endTime}`;
                        } else {
                            const endDatePart = eDate.toLocaleDateString('zh-TW', dateOpts).replace(/\//g,'/');
                            timeRange = `${datePart} ${startTime} — ${endDatePart} ${endTime}`;
                        }
                    } else {
                        timeRange = `${datePart} ${startTime}`;
                    }
                } else {
                    // Fallback to provided strings (localized already)
                    timeRange = startIso || '';
                    if (endIso) timeRange = `${timeRange} — ${endIso}`;
                }

                return `<a href="#" onclick="return false;" style="cursor:default;">
                    <div class="le">🗓️</div>
                    <div class="lt">${esc(title)}
                      <div style="font-size:12px; color:#c9d1d9; font-weight:600; margin-top:4px; line-height:1.35;">
                        ${esc(timeRange)}${esc(loc)}
                      </div>
                    </div>
                    <div class="la"> </div>
                </a>`;
            }).join('');
        } catch (e) {
            el.innerHTML = `<div style="padding:13px 16px; color:#f85149; font-size:13px;">行程載入失敗：${e.message || '未知錯誤'}</div>`;
        }
    }

    // Voice Command variables declared at top of script

    function floatTo16BitPCM(output, offset, input) {
        for (let i = 0; i < input.length; i++, offset += 2) {
            let s = Math.max(-1, Math.min(1, input[i]));
            s = s < 0 ? s * 0x8000 : s * 0x7FFF;
            output.setInt16(offset, s, true);
        }
    }

    function writeString(view, offset, string) {
        for (let i = 0; i < string.length; i++) {
            view.setUint8(offset + i, string.charCodeAt(i));
        }
    }

    function encodeWav(channelData, sampleRate) {
        const buffer = new ArrayBuffer(44 + channelData.length * 2);
        const view = new DataView(buffer);
        writeString(view, 0, 'RIFF');
        view.setUint32(4, 36 + channelData.length * 2, true);
        writeString(view, 8, 'WAVE');
        writeString(view, 12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, 1, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        writeString(view, 36, 'data');
        view.setUint32(40, channelData.length * 2, true);
        floatTo16BitPCM(view, 44, channelData);
        return buffer;
    }

    async function convertBlobToWav(blob) {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioContext.state === 'suspended') await audioContext.resume();
        
        const arrayBuffer = await blob.arrayBuffer();
        const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
        
        let channelData;
        if (audioBuffer.numberOfChannels === 1) {
            channelData = audioBuffer.getChannelData(0);
        } else {
            const tmp = new Float32Array(audioBuffer.length);
            for (let ch = 0; ch < audioBuffer.numberOfChannels; ch++) {
                const data = audioBuffer.getChannelData(ch);
                for (let i = 0; i < data.length; i++) tmp[i] += data[i];
            }
            for (let i = 0; i < tmp.length; i++) tmp[i] /= audioBuffer.numberOfChannels;
            channelData = tmp;
        }
        
        const wavBuffer = encodeWav(channelData, audioBuffer.sampleRate);
        return new Blob([wavBuffer], { type: 'audio/wav' });
    }

    // --- Audio unlock (mobile autoplay policy) ---
    // iOS/Safari/Telegram in-app browsers often block programmatic audio playback
    // unless we've "unlocked" audio during a user gesture.
    const persistentAudio = new Audio();
    let audioUnlocked = false;

    function unlockAudio() {
        if (audioUnlocked) return;
        try {
            // 1) Unlock HTMLAudioElement
            persistentAudio.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=';
            persistentAudio.play().then(() => {
                persistentAudio.pause();
                audioUnlocked = true;
                console.log('[Voice] Audio unlocked');
            }).catch((e) => {
                console.warn('[Voice] Audio unlock failed:', e);
            });

            // 2) Also resume WebAudio if needed
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume().catch(() => {});
            }
        } catch (e) {
            console.warn('[Voice] unlockAudio error:', e);
        }
    }

    function handleVoiceClick() {
        console.log('=== Voice button clicked ===');

        // Unlock audio ASAP while we still are in a user gesture
        unlockAudio();
        
        // Basic checks
        if (typeof navigator === 'undefined') {
            alert('navigator 不存在');
            return;
        }
        
        if (!navigator.mediaDevices) {
            alert('您的瀏覽器不支援錄音功能\n\n可能原因：\n1. 需要使用 HTTPS（目前可能是 HTTP）\n2. 瀏覽器版本太舊\n3. 在 Telegram 內建瀏覽器中（建議用外部瀏覽器開啟）');

        toggleVoiceCommand();

    async function toggleVoiceCommand() {
        console.log('toggleVoiceCommand called, isRecording:', isRecording);
        if (isRecording) {
            stopRecording();
        } else {
            await startRecording();
        }
    }

    async function startRecording() {
        try {
            // Check if browser supports media devices
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert('您的瀏覽器不支援語音錄製功能');
                return;
            }
            
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            // Check codec support
            let mimeType = 'audio/webm';
            if (!MediaRecorder.isTypeSupported(mimeType)) {
                mimeType = 'audio/mp4';
                if (!MediaRecorder.isTypeSupported(mimeType)) {
                    mimeType = '';
                }
            }
            
            mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
            audioChunks = [];
            
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) audioChunks.push(e.data);
            };
            
            mediaRecorder.onstop = handleRecordingStop;
            mediaRecorder.start();
            
            isRecording = true;
            const vb = document.getElementById('voiceBtn');
            if (vb) { vb.classList.add('recording'); vb.textContent = '⏸️'; }
            
            // Show hint
            document.querySelector('.hero p').textContent = '正在錄音...點擊 ⏸️ 停止';
        } catch (err) {
            console.error('Microphone error:', err);
            if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                alert('請允許瀏覽器使用麥克風權限');
            } else if (err.name === 'NotFoundError') {
                alert('找不到麥克風裝置');
            } else {
                alert('無法啟動麥克風：' + err.message);
            }
        }
    }

    function stopRecording() {
        console.log('Stopping recording...');
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(track => track.stop());
        }
        isRecording = false;
        const vb = document.getElementById('voiceBtn');
        if (vb) { vb.classList.remove('recording'); vb.textContent = '🎤'; }
        document.querySelector('.hero p').textContent = '處理中...';
    }

    async function handleRecordingStop() {
        console.log('Recording stopped, processing...', audioChunks.length, 'chunks');
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        console.log('Blob size:', blob.size);
        
        if (blob.size === 0) {
            alert('錄音失敗：沒有接收到音頻數據');
            document.querySelector('.hero p').textContent = "Tyler's AI Command Center";
            return;
        }
        
        try {
            // Convert to WAV
            document.querySelector('.hero p').textContent = '轉換音頻格式...';
            const wavBlob = await convertBlobToWav(blob);
            console.log('WAV blob size:', wavBlob.size);
            
            // Show processing indicator
            const originalText = document.querySelector('.hero h1').innerHTML;
            document.querySelector('.hero h1').innerHTML = '<span>🦊</span> 處理中...';
            document.querySelector('.hero p').textContent = '正在辨識語音...';
            
            // Send to server
            const formData = new FormData();
            formData.append('audio', wavBlob, 'voice_command.wav');
            
            console.log('Sending to server...');
            const res = await fetch('/api/voice-command?token=T628_TYLER_SAFE_ACCESS', {
                method: 'POST',
                body: formData
            });
            
            console.log('Server response status:', res.status);
            const data = await res.json();
            console.log('Server response:', data);
            
            if (data.ok) {
                document.querySelector('.hero p').textContent = '準備播放回覆...';
                
                // Show transcript briefly
                if (data.transcript) {
                    document.querySelector('.hero p').textContent = '你說: ' + data.transcript;
                }
                
                // Auto-play response
                if (data.audioUrl) {
                    lastAudioUrl = data.audioUrl;
                    const playBtn = document.getElementById('playBtn');
                    if (playBtn) playBtn.style.display = 'flex';

                    // Use persistentAudio (already unlocked on user gesture)
                    persistentAudio.oncanplay = null;
                    persistentAudio.onerror = null;
                    persistentAudio.onended = null;

                    persistentAudio.src = data.audioUrl;
                    persistentAudio.load();

                    const tryPlay = () => {
                        console.log('Audio ready to play');
                        persistentAudio.play().catch(e => {
                            console.error('Play failed:', e);
                            alert('無法自動播放回覆（瀏覽器限制）。請再點一下畫面後重試，或改用外部瀏覽器開啟 Portal。');
                        });
                    };

                    // Try immediately (works on many browsers after unlock)
                    tryPlay();

                    // Fallback when browser needs canplay
                    persistentAudio.oncanplay = () => tryPlay();
                    persistentAudio.onerror = (e) => {
                        console.error('Audio load error:', e);
                        alert('音頻載入失敗');
                    };
                }
                
                setTimeout(() => {
                    document.querySelector('.hero p').textContent = "Tyler's AI Command Center";
                }, 5000);
            } else {
                alert('處理失敗: ' + (data.error || '未知錯誤'));
                document.querySelector('.hero p').textContent = "Tyler's AI Command Center";
            }
            
            document.querySelector('.hero h1').innerHTML = originalText;
        } catch (err) {
            console.error('Voice processing error:', err);

            document.querySelector('.hero h1').innerHTML = '<span>🦊</span> 靈狐 Portal';

    }

        const a = e.target && e.target.closest ? e.target.closest('a') : null;
        if (!a) return;
        if (a.dataset && a.dataset.sameTab === '1') return;
        const href = a.getAttribute('href') || '';
        if (!href || href.startsWith('#') || href.startsWith('javascript:')) return;
        // If already explicitly targeting a new tab, do nothing.
        if (a.target === '_blank') return;
        e.preventDefault();
        window.open(a.href, '_blank', 'noopener');
    }, true);
    </script>
    
    <!-- Upload Modal -->
    <div class="upload-modal" id="uploadModal">
        <div class="upload-box">
            <div class="upload-header">
                <h2>📤 上傳檔案</h2>
                <button class="upload-close" onclick="closeUploadModal()" title="關閉">✕</button>
            </div>
            <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                <div style="font-size:48px; margin-bottom:8px;">📁</div>
                <div style="font-size:14px; color:#e6edf3; margin-bottom:4px;">點擊或拖曳檔案到此處</div>
                <div style="font-size:12px; color:#8b949e;">支援多檔案上傳</div>
            </div>
            <input type="file" id="fileInput" multiple style="display:none" onchange="handleFileSelect(event)">
            <div class="file-list" id="fileList">
                <div style="text-align:center; color:#8b949e; padding:16px;">尚未選擇檔案</div>
            </div>
            <div class="upload-actions">
                <button class="btn-cancel" onclick="closeUploadModal()">取消</button>
                <button class="btn-upload" id="uploadBtn" onclick="uploadAllFiles()">開始上傳</button>
            </div>
            <div class="upload-result" id="uploadResult"></div>
        </div>
    </div>
    
    <button class="logout-btn" onclick="logout()">🚪 登出</button>

<!-- Inline audio player enhancer for Home: mirror Explorer behavior -->
<script>
(function(){
    const audioExts = ['mp3','wav','m4a','ogg'];
    function nameIsAudio(a){
        try{
            const nameEl = a.querySelector('.lt');
            const text = (nameEl && nameEl.textContent) ? nameEl.textContent.trim().toLowerCase() : (a.textContent||'').toLowerCase();
            return audioExts.some(ext => text.endsWith('.'+ext));
        }catch(e){return false}
    }
    function enhanceHomeAttachments(){
        const container = document.getElementById('favorites-section');
        if(!container) return;
        container.querySelectorAll('a').forEach(a=>{
            try{
                if(a.dataset.enhanced) return;
                if(!nameIsAudio(a)) return;
                a.dataset.enhanced = '1';
                // prevent global home click opener for audio links
                a.addEventListener('click', (e)=>{
                    e.preventDefault();
                    e.stopPropagation();
                    // mark selected visually
                    document.querySelectorAll('#favorites-section .file-item-selected').forEach(el=>el.classList.remove('file-item-selected'));
                    a.classList.add('file-item-selected');
                }, {capture:true});

                // build player and share button
                const filePathMatch = href.match(/path=([^&]+)/);
                const filePath = filePathMatch ? decodeURIComponent(filePathMatch[1]) : null;
                const wrapper = document.createElement('div');
                wrapper.style.display = 'flex';
                wrapper.style.alignItems = 'center';
                wrapper.style.gap = '8px';
                wrapper.style.width = '100%';

                const icon = a.querySelector('.le') ? a.querySelector('.le').outerHTML : '<div class="le">🎵</div>';
                const title = a.querySelector('.lt') ? a.querySelector('.lt').outerHTML : `<div class='lt'>${a.textContent}</div>`;
                wrapper.innerHTML = icon + title;

                const audio = document.createElement('audio');
                audio.controls = true;
                audio.style.maxWidth = '300px';
                if (filePath) audio.src = `/api/workspace/raw?path=${encodeURIComponent(filePath)}&_t=${Date.now()}`;

                const shareBtn = document.createElement('button');
                shareBtn.className = 'icon-btn';
                shareBtn.style.minWidth = '60px';
                shareBtn.textContent = 'Share';
                shareBtn.onclick = async (ev) => {
                    ev.stopPropagation();
                    const link = filePath ? `${location.origin}/api/workspace/raw?path=${encodeURIComponent(filePath)}` : (a.href || '');
                    try{ await navigator.clipboard.writeText(link); alert('Download link copied to clipboard'); }
                    catch(e){ prompt('Copy this link:', link); }
                };

                // replace anchor content with wrapper and append controls
                a.innerHTML = '';
                a.appendChild(wrapper);
                a.appendChild(audio);
                a.appendChild(shareBtn);

            }catch(e){}
        });
    }
    const obs = new MutationObserver(enhanceHomeAttachments);
    obs.observe(document.getElementById('favorites-section')||document.body, { childList:true, subtree:true });
    setTimeout(enhanceHomeAttachments, 800);
})();
</script>
