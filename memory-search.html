<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🔎 找之前的筆記</title>
  <link rel="stylesheet" href="/tokens.css" />
  <style>
    body { background: var(--c-bg); color: var(--c-text); font-family: var(--font-sans); margin: 0; padding: var(--space-4); padding-top: calc(var(--space-4) + var(--safe-t)); }
    .header { display:flex; align-items:center; justify-content:space-between; gap: 12px; margin-bottom: var(--space-4); }
    .header h1 { font-size: 18px; margin: 0; color: var(--c-accent); }
    .btn { appearance: none; border: var(--bd-1); background: rgba(255,255,255,0.04); color: var(--c-text); padding: 8px 12px; border-radius: 10px; font-size: 14px; text-decoration: none; }
    .card { background: var(--c-surface); border-radius: var(--r-lg); border: var(--bd-1); padding: var(--space-4); }
    .row { display:flex; gap: 10px; align-items:center; }
    input { flex: 1; background: rgba(0,0,0,0.2); border: var(--bd-1); color: var(--c-text); padding: 10px 12px; border-radius: 10px; font-size: 14px; outline: none; }
    button { background: var(--c-accent); color: var(--c-bg); border: none; padding: 10px 14px; border-radius: 10px; font-size: 14px; font-weight: 800; cursor: pointer; }
    button:active { opacity: 0.9; }
    .hint { margin-top: 10px; opacity: 0.7; font-size: 12px; line-height: 1.6; }
    .results { margin-top: 14px; }
    .item { padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.03); margin-bottom: 10px; }
    .meta { font-size: 12px; opacity: 0.75; margin-bottom: 6px; }
    .path a { color: var(--c-accent); text-decoration: none; font-weight: 800; }
    .snippet { white-space: pre-wrap; font-size: 13px; line-height: 1.6; opacity: 0.92; }
    .pill { display:inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; border: 1px solid rgba(255,255,255,0.10); opacity: 0.85; margin-left: 6px; }
    .footer { margin-top: 18px; opacity: 0.6; font-size: 12px; text-align:center; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔎 找之前的筆記</h1>
    <button class="btn" title="關閉" onclick="history.back()">✕</button>
  </div>

  <div class="card">
    <div class="row">
      <input id="q" placeholder="輸入關鍵字（例如：Hull 第13章 / 台指期 / /mb / 交易成本）" />
      <button onclick="doSearch()">搜尋</button>
    </div>
    <div class="hint">
      - 預設模式：先搜 MEMORY + memory + archive；找不到才加搜 obsidian_vault / TylerVaultSync（auto）。
    </div>

    <div class="results" id="results"></div>
  </div>

  <div class="footer">🦊 Fox Fleet Portal · Memory Search</div>

<script>
  const TG = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
  const TG_INITDATA = TG ? TG.initData : '';

  async function apiFetch(url, options={}) {
    const headers = Object.assign({}, options.headers || {});
    if (TG_INITDATA) headers['x-tg-initdata'] = TG_INITDATA;
    return fetch(url, Object.assign({}, options, { headers }));
  }

  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  async function doSearch() {
    const q = document.getElementById('q').value.trim();
    const el = document.getElementById('results');
    if (!q) { el.innerHTML = '<div class="hint">請先輸入關鍵字</div>'; return; }

    el.innerHTML = '<div class="hint">搜尋中…</div>';

    try {
      const res = await apiFetch(`/api/memory-search?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      const rawItems = data.results || [];

      if (!rawItems.length) {
        el.innerHTML = `<div class="hint">找不到結果（vault_used=${esc(String(data.vault_used))}）</div>`;
        return;
      }

      // Filter out irrelevant zero-score hits (score=0.0 usually means "no semantic match")
      const items = rawItems.filter(r => (typeof r.score === 'number' ? r.score : parseFloat(r.score || '0')) > 0);

      if (!items.length) {
        el.innerHTML = `<div class="hint">沒有足夠相關的結果（已自動過濾 score=0.0；vault_used=${esc(String(data.vault_used))}）</div>`;
        return;
      }

      el.innerHTML = items.map(r => {
        const viewer = `/viewer?path=${encodeURIComponent(r.path)}`;
        const range = (r.line_range && r.line_range.length===2) ? `${r.line_range[0]}-${r.line_range[1]}` : '';
        return `
          <div class="item">
            <div class="meta">
              score: ${esc(String(r.score.toFixed ? r.score.toFixed(2) : r.score))}
              <span class="pill">vault_used: ${esc(String(data.vault_used))}</span>
            </div>
            <div class="path"><a href="${viewer}">${esc(r.path)}</a> <span class="pill">lines ${esc(range)}</span></div>
            <div class="snippet">${esc(r.snippet)}</div>
          </div>
        `;
      }).join('');

    } catch (e) {
      el.innerHTML = `<div class="hint">搜尋失敗：${esc(e.message || String(e))}</div>`;
    }
  }

  // Enter to search
  document.getElementById('q').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doSearch();
  });
</script>
</body>
</html>
